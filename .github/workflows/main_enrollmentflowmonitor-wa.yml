# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - EnrollmentFlowMonitor-Wa

env:
  APP_NAME: EnrollmentFlowMonitor-Wa

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install and build workspaces
        run: |
          npm install
          npm run prisma:generate -w @efm/api
          npm run build -w @efm/shared
          npm run build -w @efm/api
          npm run build -w @efm/web

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          include-hidden-files: true
          path: |
            package.json
            package-lock.json
            apps/api/**
            packages/shared/**
            out/**
            node_modules/**
            !.git/**
            !apps/web/**

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Validate required Azure secrets
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          if [ -z "$AZURE_CLIENT_ID" ]; then echo "Missing secret: AZURE_CLIENT_ID"; missing=1; fi
          if [ -z "$AZURE_TENANT_ID" ]; then echo "Missing secret: AZURE_TENANT_ID"; missing=1; fi
          if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then echo "Missing secret: AZURE_SUBSCRIPTION_ID"; missing=1; fi
          if [ "$missing" -ne 0 ]; then
            echo "One or more required Azure secrets are missing. Add them in GitHub repo settings."
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service deploy/runtime settings
        run: |
          RG=$(az resource list --name "$APP_NAME" --resource-type Microsoft.Web/sites --query "[0].resourceGroup" -o tsv)
          echo "Resource group: $RG"
          IS_LINUX=$(az webapp show --name "$APP_NAME" --resource-group "$RG" --query "reserved" -o tsv)
          echo "isLinux=$IS_LINUX"

          az webapp config appsettings set --name "$APP_NAME" --resource-group "$RG" --settings \
            SCM_DO_BUILD_DURING_DEPLOYMENT=false \
            ENABLE_ORYX_BUILD=false \
            WEBSITE_WARMUP_PATH=/health \
            WEBSITES_CONTAINER_START_TIME_LIMIT=1800

          if [ "$IS_LINUX" = "true" ]; then
            az webapp config set --name "$APP_NAME" --resource-group "$RG" --startup-file "node out/apps/api/server.js"
          else
            az webapp config appsettings set --name "$APP_NAME" --resource-group "$RG" --settings WEBSITE_NODE_DEFAULT_VERSION=~22
          fi

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: 'Production'
          package: .
